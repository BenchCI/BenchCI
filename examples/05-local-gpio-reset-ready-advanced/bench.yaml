version: "1"
bench:
  name: "local-gpio-reset-ready-bench"
  description: "Linux GPIO control bench for reset sequencing, ready-pin validation, and interrupt edge monitoring."
defaults:
  node: dut
  timeouts:
    within_ms: 2000
artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true
nodes:
  dut:
    kind: mcu
    role: primary
    tags: ["linux-gpio", "uart", "openocd"]
    flash:
      backend: openocd
      interface_cfg: "interface/stlink.cfg"
      target_cfg: "target/stm32f4x.cfg"
      artifact: "build/fw.elf"
    reset:
      method: none
    transports:
      console:
        backend: uart
        port: "/dev/ttyUSB0"       # Replace with the DUT UART port.
        baud: 115200
        timeout_ms: 100
    gpio:
      reset_n:
        backend: local_gpio
        chip: "/dev/gpiochip0"
        line: 17
        direction: output
        active_high: false
      boot0:
        backend: local_gpio
        chip: "/dev/gpiochip0"
        line: 27
        direction: output
        active_high: true
      ready:
        backend: local_gpio
        chip: "/dev/gpiochip0"
        line: 22
        direction: input
        active_high: true
        bias: pull_down
      irq:
        backend: local_gpio
        chip: "/dev/gpiochip0"
        line: 23
        direction: input
        active_high: true
        bias: pull_down
        edge: rising
