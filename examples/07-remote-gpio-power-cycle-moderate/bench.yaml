version: "1"

bench:
  name: "remote-gpio-power-cycle-bench"
  description: "Example bench where GPIO lines are controlled through a remote BenchCI GPIO agent/bridge. Replace host, port, token_env, chip, line mappings, and UART port for your setup."

defaults:
  node: dut
  timeouts:
    within_ms: 2000

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  dut:
    kind: device
    role: primary
    tags: ["remote-gpio", "uart", "power-cycle"]
    transports:
      console:
        backend: uart
        # UART is still opened by the machine running this BenchCI run.
        # Replace with the DUT console port visible on that machine.
        port: "/dev/ttyUSB0"
        baud: 115200
        timeout_ms: 100
    gpio:
      power_en:
        backend: remote_gpio
        # IP/host of the machine running the BenchCI agent GPIO service.
        host: "192.168.1.60"
        port: 8090
        # Set this env var on the machine running the BenchCI run.
        # It must contain the Bearer token accepted by the remote GPIO agent.
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 5
        direction: output
        active_high: true
      fault_n:
        backend: remote_gpio
        host: "192.168.1.60"
        port: 8090
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 6
        direction: input
        active_high: false
        bias: pull_up
      heartbeat:
        backend: remote_gpio
        host: "192.168.1.60"
        port: 8090
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 7
        direction: input
        active_high: true
        bias: pull_down
        edge: both
