version: "1"
suite:
  name: "remote-gpio-power-cycle"
  description: "Moderate example: power-cycle a device through GPIO, verify healthy boot, and monitor heartbeat."
  version: "1.0.0"
  requirement_ids:
    - REQ-POWER-001
    - REQ-HEARTBEAT-001
  tags:
    - gpio
    - power-cycle
    - heartbeat
tests:
  - name: "power cycle and boot"
    test_case_id: TC-POWER-BOOT-001
    requirement_ids:
      - REQ-POWER-001
    tags: ["power", "boot"]
    steps:
      - gpio_set:
          node: dut
          line: power_en
          value: false
      - sleep_ms: 500
      - gpio_set:
          node: dut
          line: power_en
          value: true
      - expect_uart:
          node: dut
          transport: console
          contains: "SYSTEM READY"
          within_ms: 5000
      - gpio_get:
          node: dut
          line: fault_n
          expect: false
  - name: "heartbeat is alive"
    test_case_id: TC-HEARTBEAT-001
    requirement_ids:
      - REQ-HEARTBEAT-001
    tags: ["heartbeat"]
    steps:
      - gpio_wait_edge:
          node: dut
          line: heartbeat
          edge: both
          within_ms: 3000
