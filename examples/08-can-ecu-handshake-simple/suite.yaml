version: "1"

suite:
  name: "can-ecu-handshake"
  description: "Simple CAN example: send one request frame and verify one response frame. Kept intentionally lightweight."

tests:
  - name: "diagnostic_request_response"
    steps:
      - send_can:
          node: ecu
          transport: canbus
          frame:
            id: 257
            extended: false
            data: "01 02 0A FF"
      - expect_can:
          node: ecu
          transport: canbus
          frame:
            id: 513
            extended: false
            data: "AA BB"
          within_ms: 1000
