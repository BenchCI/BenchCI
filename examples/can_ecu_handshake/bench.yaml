version: "1"

bench:
  name: "can-ecu-handshake-bench"
  description: "Bench for validating request/response behavior on a classic CAN bus."

defaults:
  node: ecu
  timeouts:
    within_ms: 1000

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  ecu:
    kind: ecu
    role: primary
    tags: ["can", "socketcan"]
    transports:
      canbus:
        backend: can
        interface: "can0"
        bitrate: 500000
        timeout_ms: 500
