version: "1"

bench:
  name: "stm32wl-boot-validation-bench"
  description: "Single-DUT bench for validating firmware boot, banner output, and command/response behavior over UART."

defaults:
  node: dut
  timeouts:
    within_ms: 1500

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  dut:
    kind: mcu
    role: primary
    tags: ["stm32wl", "uart", "openocd", "smoke-test"]
    flash:
      backend: openocd
      interface_cfg: "interface/stlink.cfg"
      target_cfg: "target/stm32wlx.cfg"
      artifact: "build/firmware.elf"
      adapter_speed_khz: 2000
    reset:
      method: openocd
    transports:
      console:
        backend: uart
        port: "/dev/ttyACM0"
        baud: 115200
        timeout_ms: 100
