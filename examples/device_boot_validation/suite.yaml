version: "1"

suite:
  name: "device-boot-validation"
  description: "Validate that firmware boots, exposes version info, and responds to a simple command."

tests:
  - name: "boot_banner_is_printed"
    steps:
      - flash:
          node: dut
      - reset:
          node: dut
      - expect_uart:
          node: dut
          transport: console
          contains: "[BCI] BOOT_OK"
          within_ms: 4000

  - name: "firmware_version_is_reported"
    steps:
      - send_uart:
          node: dut
          transport: console
          data: "GET_VERSION\n"
      - expect_uart:
          node: dut
          transport: console
          regex: "\\[BCI\\] FW:.* GIT:.*"
          within_ms: 1000

  - name: "ping_command_round_trip"
    steps:
      - send_uart:
          node: dut
          transport: console
          data: "PING\n"
      - expect_uart:
          node: dut
          transport: console
          contains: "[BCI] PONG"
          within_ms: 1000
