version: "1"

bench:
  name: "esp32-esptool-wifi-probe-bench"
  description: "Bench for flashing an ESP32-family device and validating text-based startup over UART."

defaults:
  node: esp
  timeouts:
    within_ms: 1500

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  esp:
    kind: mcu
    role: primary
    tags: ["esp32", "esptool", "uart"]
    flash:
      backend: esptool
      port: "/dev/ttyUSB4"
      baud: 921600
      chip: "esp32s3"
      offset: "0x10000"
      artifact: "build/esp_app.bin"
      extra_args:
        - "--before"
        - "default_reset"
        - "--after"
        - "hard_reset"
    reset:
      method: esptool
    transports:
      console:
        backend: uart
        port: "/dev/ttyUSB4"
        baud: 115200
        timeout_ms: 100
