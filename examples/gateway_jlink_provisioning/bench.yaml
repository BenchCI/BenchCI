version: "1"

bench:
  name: "gateway-jlink-provisioning-bench"
  description: "Bench for provisioning a gateway board flashed via SEGGER J-Link."

defaults:
  node: gateway
  timeouts:
    within_ms: 1500

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  gateway:
    kind: gateway
    role: primary
    tags: ["jlink", "uart"]
    flash:
      backend: jlink
      device: "STM32F407VG"
      interface: "SWD"
      speed_khz: 4000
      serial: "801234567"
      artifact: "build/gateway.elf"
    reset:
      method: jlink
    transports:
      console:
        backend: uart
        port: "/dev/ttyUSB3"
        baud: 115200
        timeout_ms: 100
