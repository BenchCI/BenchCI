version: "1"

suite:
  name: "gateway-jlink-provisioning"
  description: "Provision a gateway image through J-Link and verify post-boot console output."

tests:
  - name: "gateway_image_starts"
    steps:
      - flash:
          node: gateway
      - reset:
          node: gateway
      - expect_uart:
          node: gateway
          transport: console
          contains: "GATEWAY ONLINE"
          within_ms: 4000
