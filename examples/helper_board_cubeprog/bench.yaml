version: "1"

bench:
  name: "helper-board-cubeprog-bench"
  description: "Bench for a helper/controller board flashed via STM32CubeProgrammer."

defaults:
  node: helper
  timeouts:
    within_ms: 1500

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  helper:
    kind: mcu
    role: helper
    tags: ["cubeprog", "uart", "stm32"]
    flash:
      backend: cubeprog
      port: "SWD"
      serial: "004200343532510D20313839"
      artifact: "build/helper.hex"
    reset:
      method: cubeprog
    transports:
      console:
        backend: uart
        port: "/dev/ttyUSB2"
        baud: 115200
        timeout_ms: 100
