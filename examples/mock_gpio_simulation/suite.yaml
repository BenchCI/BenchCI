version: "1"

suite:
  name: "mock-gpio-simulation"
  description: "Exercise GPIO-oriented logic with the mock_gpio backend."

tests:
  - name: "set_and_read_mock_lines"
    steps:
      - gpio_set:
          node: simulator
          line: trigger_out
          value: true
      - gpio_get:
          node: simulator
          line: sensed_in

  - name: "wait_on_mock_lines"
    steps:
      - gpio_expect:
          node: simulator
          line: sensed_in
          value: true
          within_ms: 200
      - gpio_wait_edge:
          node: simulator
          line: irq_in
          edge: falling
          within_ms: 200
