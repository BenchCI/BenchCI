version: "1"

bench:
  name: "modbus-rtu-plc-validation-bench"
  description: "Bench for validating a serial Modbus RTU device through a USB-RS485 interface."

defaults:
  node: plc
  timeouts:
    within_ms: 1500

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  plc:
    kind: plc
    role: primary
    tags: ["modbus-rtu", "rs485"]
    transports:
      fieldbus:
        backend: modbus_rtu
        port: "/dev/ttyUSB1"
        baud: 9600
        timeout_ms: 500
        default_slave: 10
