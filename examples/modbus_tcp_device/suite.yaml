name: example_test

tests:

  - name: read_version_registers
    steps:
      - modbus_read_holding_registers:
          address: 100
          count: 2
          expect: [1, 42]

  - name: enable_output
    steps:
      - modbus_write_single_coil:
          address: 10
          value: true

      - sleep_ms: 500

      - modbus_read_coils:
          address: 10
          count: 1
          expect: [true]

  - name: write_and_verify_register
    steps:
      - modbus_write_single_register:
          address: 200
          value: 1234

      - modbus_read_holding_registers:
          address: 200
          count: 1
          expect: [1234]