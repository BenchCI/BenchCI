version: "1"

bench:
  name: "remote-gpio-power-cycle-bench"
  description: "Split deployment where the test runner is separate from a Linux machine exposing GPIO over the BenchCI Agent."

defaults:
  node: dut
  timeouts:
    within_ms: 2000

artifacts:
  root_dir: "benchci-results"
  per_node_dirs: true

nodes:
  dut:
    kind: industrial_device
    role: primary
    tags: ["remote-gpio", "uart"]
    transports:
      console:
        backend: uart
        port: "/dev/ttyUSB0"
        baud: 115200
        timeout_ms: 100
    gpio:
      power_en:
        backend: remote_gpio
        host: "192.168.10.60"
        port: 8080
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 5
        direction: output
        active_high: true
      fault_n:
        backend: remote_gpio
        host: "192.168.10.60"
        port: 8080
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 6
        direction: input
        active_high: false
        bias: pull_up
      heartbeat:
        backend: remote_gpio
        host: "192.168.10.60"
        port: 8080
        token_env: "BENCHCI_REMOTE_GPIO_TOKEN"
        chip: "/dev/gpiochip0"
        line: 7
        direction: input
        active_high: true
        bias: pull_down
        edge: both
