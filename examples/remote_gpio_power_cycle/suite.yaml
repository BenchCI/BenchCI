version: "1"

suite:
  name: "remote-gpio-power-cycle"
  description: "Power-cycle a device through remote GPIO, then verify healthy boot and a heartbeat edge."

tests:
  - name: "power_cycle_and_boot"
    steps:
      - gpio_set:
          node: dut
          line: power_en
          value: false
      - sleep_ms: 500
      - gpio_set:
          node: dut
          line: power_en
          value: true
      - expect_uart:
          node: dut
          transport: console
          contains: "SYSTEM READY"
          within_ms: 5000
      - gpio_get:
          node: dut
          line: fault_n
          expect: false

  - name: "heartbeat_is_alive"
    steps:
      - gpio_wait_edge:
          node: dut
          line: heartbeat
          edge: both
          within_ms: 3000
