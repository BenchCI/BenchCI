name: test_board

flash:
  backend: jlink
  device: MIMXRT1061CVL5B
  interface: SWD
  speed_khz: 4000
  # Optional: specify a specific J-Link probe if multiple are connected
  # serial: "123456789"

reset:
  method: jlink

transport:
  backend: uart
  port: /dev/ttyUSB0
  baud: 115200
  timeout_ms: 100